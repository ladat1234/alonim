<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>חיפוש עלונים - מסך מפוצל</title>
    <style>
        body { margin: 0; padding: 0; font-family: Arial, Helvetica, sans-serif; height: 100vh; overflow: hidden; background: #edf2f7; }
        
        /* עיצוב המסך המפוצל */
        .layout-container { display: flex; height: 100vh; width: 100%; }
        
        /* צד ימין - סרגל החיפוש */
        .right-panel { 
            width: 35%; 
            background: #ffffff; 
            padding: 20px; 
            overflow-y: auto; 
            box-sizing: border-box; 
            border-left: 2px solid #e2e8f0; 
            box-shadow: -2px 0 10px rgba(0,0,0,0.05);
        }
        
        /* צד שמאל - תצוגת ה-PDF */
        .left-panel { 
            width: 65%; 
            height: 100%; 
            background: #cbd5e0; 
            display: flex; 
            align-items: center; 
            justify-content: center;
        }
        
        iframe { width: 100%; height: 100%; border: none; }
        
        .placeholder-text { color: #4a5568; font-size: 20px; font-weight: bold; }

        /* עיצוב רכיבי החיפוש */
        .search-input {
            width: 100%;
            padding: 15px;
            font-size: 16px;
            border: 2px solid #3182ce;
            border-radius: 8px;
            box-sizing: border-box;
            margin-bottom: 15px;
        }
        .result-card {
            background: #f7fafc;
            border: 1px solid #e2e8f0;
            border-right: 5px solid #3182ce;
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .result-card:hover {
            background: #ebf8ff;
            transform: translateY(-2px);
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .result-title { font-size: 16px; font-weight: bold; color: #2b6cb0; margin-bottom: 5px; }
        .result-snippet { font-size: 14px; color: #4a5568; line-height: 1.5; margin: 0; }
        .highlight { background-color: #fefcbf; font-weight: bold; color: #b7791f; padding: 0 2px; }
    </style>
</head>
<body>

<div class="layout-container">
    <!-- צד ימין (חיפוש) -->
    <div class="right-panel">
        <input type="text" id="smartSearchInput" class="search-input" placeholder="חפש מילה, מושג או משפט..." disabled>
        <div id="statusMessage" style="color: #718096; font-size: 14px;">מטעין את מאגר החיפוש...</div>
        <div id="searchResults"></div>
    </div>

    <!-- צד שמאל (תצוגה) -->
    <div class="left-panel">
        <iframe id="pdfViewer" src="about:blank" style="display:none;"></iframe>
        <div id="placeholderText" class="placeholder-text">🔍 חפש מושג ולחץ על תוצאה כדי להציג את העלון</div>
    </div>
</div>

<script>
    let alonData = [];

    // הקישור הישיר למאגר ולתיקיית ה-PDF שיצרנו
    const JSON_URL = 'https://raw.githubusercontent.com/ladat1234/alonim/main/search_index.json';
    const PDF_BASE_URL = 'https://ladat1234.github.io/alonim/pdfs/';
    
    fetch(JSON_URL)
        .then(response => response.json())
        .then(data => {
            alonData = data;
            document.getElementById('smartSearchInput').disabled = false;
            document.getElementById('statusMessage').style.display = 'none';
        })
        .catch(() => {
            document.getElementById('statusMessage').innerText = 'שגיאה: לא ניתן לטעון נתונים.';
        });

    // הפונקציה שפותחת את ה-PDF ומסמנת בצהוב
    window.openPdf = function(alonNumber, searchTerm) {
        const viewer = document.getElementById('pdfViewer');
        const placeholder = document.getElementById('placeholderText');
        
        // בניית הקישור עם פקודת החיפוש המובנית של הדפדפן
        const pdfUrl = `${PDF_BASE_URL}${alonNumber}.pdf#search="${searchTerm}"`;
        
        viewer.src = pdfUrl;
        viewer.style.display = 'block';
        placeholder.style.display = 'none';
    };

    function escapeRegExp(string) {
        return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    }

    document.getElementById('smartSearchInput').addEventListener('input', function(e) {
        const term = e.target.value.trim();
        const resultsDiv = document.getElementById('searchResults');
        
        if(term.length < 2) { 
            resultsDiv.innerHTML = '';
            return;
        }

        const safeTerm = escapeRegExp(term);
        // מאפשר גמישות לאותיות ו/י בתוך המילה
        const flexibleTerm = safeTerm.replace(/[וי]/g, '[וי]?');
        const regex = new RegExp(flexibleTerm, 'g');

        let htmlOutput = '';
        let matchCount = 0;

        alonData.forEach(file => {
            const content = file.content;
            const match = regex.exec(content);
            
            if (match) {
                matchCount++;
                const alonNumber = file.filename.replace(/\D/g, ''); // חולץ רק את המספר מהשם
                
                // יצירת תצוגה מקדימה קצרה
                const start = Math.max(0, match.index - 60);
                const end = Math.min(content.length, match.index + match[0].length + 60);
                let snippet = content.substring(start, end);
                snippet = snippet.replace(regex, matched => `<span class="highlight">${matched}</span>`);

                // כרטיסייה לחיצה שמפעילה את פתיחת ה-PDF
                htmlOutput += `
                    <div class="result-card" onclick="openPdf('${alonNumber}', '${term}')">
                        <div class="result-title">📄 נמצא בעלון מספר ${alonNumber}</div>
                        <p class="result-snippet">...${snippet}...</p>
                    </div>
                `;
            }
            regex.lastIndex = 0; 
        });

        if (matchCount === 0) {
            resultsDiv.innerHTML = '<div style="margin-top:10px; color:#718096;">לא נמצאו תוצאות.</div>';
        } else {
            resultsDiv.innerHTML = `<div style="margin-bottom:15px; font-weight:bold; color:#2f855a;">נמצאו ${matchCount} תוצאות (לחץ להצגה):</div>` + htmlOutput;
        }
    });
</script>
</body>
</html>
