<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>חיפוש עלונים - מסך מפוצל מתקדם</title>
    
    <link rel="preload" href="https://ladat1234.github.io/alonim/search_index.json" as="fetch" crossorigin="anonymous">

    <style>
        body { margin: 0; padding: 0; font-family: Arial, Helvetica, sans-serif; height: 100vh; overflow: hidden; background: #edf2f7; }
        .layout-container { display: flex; height: 100vh; width: 100%; }
        .right-panel { width: 35%; background: #ffffff; padding: 20px; overflow-y: auto; box-sizing: border-box; border-left: 2px solid #e2e8f0; box-shadow: -2px 0 10px rgba(0,0,0,0.05); }
        .left-panel { width: 65%; height: 100%; background: #cbd5e0; display: flex; align-items: center; justify-content: center; }
        iframe { width: 100%; height: 100%; border: none; }
        .placeholder-text { color: #4a5568; font-size: 20px; font-weight: bold; text-align: center; padding: 20px; }
        
        /* עיצוב מעטפת החיפוש וכפתור הניקוי */
        .search-wrapper { position: relative; width: 100%; margin-bottom: 15px; }
        .search-input { width: 100%; padding: 15px 15px 15px 40px; font-size: 16px; border: 2px solid #3182ce; border-radius: 8px; box-sizing: border-box; transition: all 0.2s; }
        .search-input:focus { outline: none; border-color: #2b6cb0; box-shadow: 0 0 0 3px rgba(49, 130, 206, 0.2); }
        .clear-btn { display: none; position: absolute; left: 15px; top: 50%; transform: translateY(-50%); background: none; border: none; font-size: 20px; color: #a0aec0; cursor: pointer; padding: 0; outline: none; transition: color 0.2s; }
        .clear-btn:hover { color: #4a5568; }

        /* עיצוב אפשרויות החיפוש */
        .search-options { margin-bottom: 15px; background: #f7fafc; padding: 10px; border-radius: 8px; border: 1px solid #e2e8f0; }
        .toggle-container { margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
        .toggle-container:last-child { margin-bottom: 0; }
        .toggle-container input[type="radio"] { width: 16px; height: 16px; cursor: pointer; margin: 0; }
        .toggle-container label { font-size: 14px; color: #4a5568; cursor: pointer; user-select: none; }
        
        /* מדד ביצועים */
        .search-metrics { font-size: 12px; color: #718096; margin-bottom: 15px; min-height: 18px; }

        /* אנימציית טעינה (ספינר) */
        .loader { border: 4px solid rgba(49, 130, 206, 0.2); border-left-color: #3182ce; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .result-card { background: #f7fafc; border: 1px solid #e2e8f0; border-right: 5px solid #3182ce; padding: 15px; margin-bottom: 12px; border-radius: 8px; cursor: pointer; transition: all 0.2s; }
        .result-card:hover { background: #ebf8ff; transform: translateY(-2px); box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        
        /* עיצוב התוצאה המסומנת (לניווט מקלדת) */
        .result-card.focused { background: #ebf8ff; transform: translateY(-2px); box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-right: 8px solid #2b6cb0; outline: 2px solid #63b3ed; }

        .result-title { font-size: 16px; font-weight: bold; color: #2b6cb0; margin-bottom: 5px; }
        .result-snippet { font-size: 14px; color: #4a5568; line-height: 1.5; margin: 0; }
        .highlight { background-color: #fefcbf; font-weight: bold; color: #b7791f; padding: 0 2px; border-radius: 2px; }
    </style>
</head>
<body>

<div class="layout-container">
    <div class="right-panel">
        
        <div class="search-wrapper">
            <input type="text" id="smartSearchInput" class="search-input" placeholder="חפש מילה, מושג או משפט..." disabled>
            <button id="clearBtn" class="clear-btn" title="נקה חיפוש">✖</button>
        </div>
        
        <div class="search-options">
            <div class="toggle-container">
                <input type="radio" name="searchMode" id="modeBroad" value="broad" checked>
                <label for="modeBroad">חיפוש רחב (מילים ברצף, כולל כתיב מלא/חסר)</label>
            </div>
            <div class="toggle-container">
                <input type="radio" name="searchMode" id="modeExact" value="exact">
                <label for="modeExact">חיפוש מדויק (מילים מדויקות בלבד ברצף)</label>
            </div>
            <div class="toggle-container">
                <input type="radio" name="searchMode" id="modeAdvanced" value="advanced">
                <label for="modeAdvanced">חיפוש מתקדם (עד 20 מילים מרחק בין מילים)</label>
            </div>
        </div>

        <div id="loaderSpinner" class="loader"></div>
        <div id="searchMetrics" class="search-metrics"></div>
        <div id="searchResults"></div>
    </div>

    <div class="left-panel">
        <iframe id="pdfViewer" src="about:blank" style="display:none;"></iframe>
        <div id="placeholderText" class="placeholder-text">🔍 חפש מושג ולחץ על תוצאה כדי להציג את העלון והדגשת המילה</div>
    </div>
</div>

<script>
    let alonData = [];
    let focusedResultIndex = -1; 

    const JSON_URL = 'https://ladat1234.github.io/alonim/search_index.json';
    const PDF_BASE_URL = 'https://ladat1234.github.io/alonim/pdfs/';
    
    // טעינת הנתונים
    fetch(JSON_URL)
        .then(response => response.json())
        .then(data => {
            alonData = data;
            document.getElementById('smartSearchInput').disabled = false;
            document.getElementById('loaderSpinner').style.display = 'none';
        })
        .catch(() => {
            document.getElementById('loaderSpinner').style.display = 'none';
            document.getElementById('searchResults').innerHTML = '<div style="color:red;">שגיאה: לא ניתן לטעון נתונים.</div>';
        });

    // פתיחת ה-PDF
    window.openPdf = function(alonNumber, searchTerm) {
        const viewer = document.getElementById('pdfViewer');
        const placeholder = document.getElementById('placeholderText');
        const fileUrl = `${PDF_BASE_URL}${alonNumber}.pdf`;
        const advancedViewerUrl = 'https://ladat1234.github.io/alonim/pdfviewer/web/viewer.html';
        
        const finalUrl = `${advancedViewerUrl}?file=${encodeURIComponent(fileUrl)}#search=${encodeURIComponent(searchTerm)}&phrase=true`;
        
        viewer.src = finalUrl;
        viewer.style.display = 'block';
        placeholder.style.display = 'none';
    };

    function escapeRegExp(string) {
        return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    }

    // פונקציית החיפוש
    function runSearch() {
        const startTime = performance.now(); 
        
        const inputElement = document.getElementById('smartSearchInput');
        const clearBtn = document.getElementById('clearBtn');
        const searchMode = document.querySelector('input[name="searchMode"]:checked').value;
        const term = inputElement.value.trim();
        const resultsDiv = document.getElementById('searchResults');
        const metricsDiv = document.getElementById('searchMetrics');
        
        focusedResultIndex = -1; 

        // הצגת כפתור הניקוי
        clearBtn.style.display = term.length > 0 ? 'block' : 'none';

        if(term.length < 2) { 
            resultsDiv.innerHTML = '';
            metricsDiv.innerText = '';
            return;
        }

        const words = term.split(/\s+/).filter(w => w.length > 0).map(escapeRegExp);
        if (words.length === 0) return;

        // בדיקת סוג החיפוש
        const isExact = searchMode === 'exact';
        const isAdvanced = searchMode === 'advanced';

        let processedWords = words;
        if (!isExact) {
            // בחיפוש רחב ובחיפוש מתקדם מאפשרים גמישות לאותיות ו/י
            processedWords = words.map(w => w.replace(/[וי]/g, '[וי]?'));
        }

        let regexStr = "";
        
        // הגדרת הרווח בין המילים: עד 20 מילים בחיפוש מתקדם, או מילים ברצף
        const gap = isAdvanced ? `(?:\\s+\\S+){0,20}\\s+` : `\\s+`;

        if (processedWords.length === 1) {
            regexStr = processedWords[0];
        } else if (processedWords.length === 2 && isAdvanced) {
            // אם חיפוש מתקדם ויש 2 מילים - חיפוש בכל סדר
            const w1 = processedWords[0];
            const w2 = processedWords[1];
            regexStr = `(?:${w1}${gap}${w2}|${w2}${gap}${w1})`;
        } else {
            // ליותר מ-2 מילים, או בחיפוש רגיל/מדויק - לפי הסדר
            regexStr = processedWords.join(gap);
        }

        const regex = new RegExp(regexStr, 'g');

        let htmlOutput = '';
        let matchCount = 0;

        alonData.forEach(file => {
            const content = file.content;
            const match = regex.exec(content);
            
            if (match) {
                matchCount++;
                // תמיכה בשם קובץ כמו "1.pdf" לפי ה-JSON שצורף
                const alonNumber = file.filename.replace(/\D/g, ''); 
                
                const start = Math.max(0, match.index - 60);
                const end = Math.min(content.length, match.index + match[0].length + 60);
                let snippet = content.substring(start, end);
                
                // הדגשת כל מילת חיפוש בנפרד
                processedWords.forEach(wordRegexStr => {
                    const highlightRegex = new RegExp(`(${wordRegexStr})`, 'g');
                    snippet = snippet.replace(highlightRegex, `<span class="highlight">$1</span>`);
                });

                htmlOutput += `
                    <div class="result-card" onclick="openPdf('${alonNumber}', '${term}')">
                        <div class="result-title">📄 נמצא בעלון מספר ${alonNumber}</div>
                        <p class="result-snippet">...${snippet}...</p>
                    </div>
                `;
            }
            regex.lastIndex = 0; 
        });

        const endTime = performance.now(); 
        const timeTaken = ((endTime - startTime) / 1000).toFixed(3); 

        if (matchCount === 0) {
            resultsDiv.innerHTML = '<div style="margin-top:10px; color:#718096;">לא נמצאו תוצאות עבור החיפוש.</div>';
            metricsDiv.innerText = '';
        } else {
            resultsDiv.innerHTML = `<div style="margin-bottom:10px; font-weight:bold; color:#2f855a;">נמצאו ${matchCount} תוצאות:</div>` + htmlOutput;
            metricsDiv.innerText = `החיפוש הושלם ב-${timeTaken} שניות`; 
        }
    }

    // ניקוי החיפוש בלחיצה על כפתור X
    document.getElementById('clearBtn').addEventListener('click', function() {
        const input = document.getElementById('smartSearchInput');
        input.value = '';
        runSearch();
        input.focus();
    });

    // מאזינים לשינויים בתיבת הטקסט ובאפשרויות החיפוש
    document.getElementById('smartSearchInput').addEventListener('input', runSearch);
    
    document.querySelectorAll('input[name="searchMode"]').forEach(radio => {
        radio.addEventListener('change', runSearch);
    });

    // ניווט מקלדת
    document.getElementById('smartSearchInput').addEventListener('keydown', function(e) {
        const results = document.querySelectorAll('.result-card');
        if (results.length === 0) return;

        if (e.key === 'ArrowDown') {
            e.preventDefault();
            focusedResultIndex++;
            if (focusedResultIndex >= results.length) focusedResultIndex = 0;
            updateFocus(results);
        } else if (e.key === 'ArrowUp') {
            e.preventDefault();
            focusedResultIndex--;
            if (focusedResultIndex < 0) focusedResultIndex = results.length - 1;
            updateFocus(results);
        } else if (e.key === 'Enter') {
            e.preventDefault();
            if (focusedResultIndex >= 0 && focusedResultIndex < results.length) {
                results[focusedResultIndex].click(); 
            }
        }
    });

    // פונקציית עזר לסימון התוצאה בבחירת מקלדת
    function updateFocus(results) {
        results.forEach((el, index) => {
            if (index === focusedResultIndex) {
                el.classList.add('focused');
                el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            } else {
                el.classList.remove('focused');
            }
        });
    }
</script>
</body>
</html>
